name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dfile.encoding=UTF-8"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build shaded JAR
        run: ./gradlew :client:shadowJar

      - name: Find shaded JAR
        id: find_jar
        run: |
          JAR_PATH=$(find runelite-client/build/libs -name "*-shaded.jar" | head -1)
          JAR_NAME=$(basename "$JAR_PATH")
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "jar_name=$JAR_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate shaded JAR found
        run: |
          if [ -z "${{ steps.find_jar.outputs.jar_path }}" ]; then
            echo "ERROR: Shaded JAR not found. Build may have failed."
            exit 1
          fi
          echo "Found JAR: ${{ steps.find_jar.outputs.jar_path }}"

      - name: Generate version tag
        id: version
        run: |
          # Semantic versioning: v1.0.N (patch increments per build)
          # Only consider versioned releases (v*) — excludes nightly tag
          LATEST=$(gh release list --limit 20 --json tagName -q '[.[] | select(.tagName | test("^v[0-9]"))] | .[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            VERSION="v1.0.1"
          else
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.//')
            if ! echo "$PATCH" | grep -qE '^[0-9]+$'; then
              PATCH=0
            fi
            NEXT=$((PATCH + 1))
            VERSION="v1.0.$NEXT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed release version: $VERSION"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: ${{ steps.find_jar.outputs.jar_path }}
          generate_release_notes: true
